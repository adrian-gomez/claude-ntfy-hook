name: tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "selfhost/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    name: pytest · ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest -v

  install-script:
    name: install.sh --check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run install.sh, then --check
        run: |
          ./install.sh
          ./install.sh --check
          test -f .env.topics
          test -L "$HOME/.claude/scripts/ntfy_permission.py"
